name: Mirror Docker Images

on:
    workflow_dispatch:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    

jobs:
  mirror-alpine:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/library/alpine
      tag: 3.23.3
      target_package: ${{ github.repository_owner }}/alpine
    permissions:
      packages: write
      contents: read

  mirror-busybox:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/library/busybox
      tag: 1.37.0
      target_package: ${{ github.repository_owner }}/busybox
    permissions:
      packages: write
      contents: read

  mirror-busybox-grafana:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/library/busybox
      tag: 1.31.1
      target_package: ${{ github.repository_owner }}/busybox
    permissions:
      packages: write
      contents: read
      
  mirror-grafana-image-renderer:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/grafana/grafana-image-renderer
      tag: latest
      target_package: ${{ github.repository_owner }}/grafana-image-renderer
    permissions: 
      packages: write
      contents: read

  mirror-kubectl:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/alpine/kubectl
      tag: 1.34.2
      target_package: ${{ github.repository_owner }}/kubectl
    permissions:
      packages: write
      contents: read

  mirror-aws-cli:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/amazon/aws-cli
      tag: 2.33.7
      target_package: ${{ github.repository_owner }}/aws-cli
    permissions:
      packages: write
      contents: read
      
  mirror-grafana:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/grafana/grafana
      tag: 12.3.1
      target_package: ${{ github.repository_owner }}/grafana
    permissions:
      packages: write
      contents: read

  mirror-grafana-11-4-0:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/grafana/grafana
      tag: 11.4.0
      target_package: ${{ github.repository_owner }}/grafana
    permissions:
      packages: write
      contents: read

  mirror-postgres:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/library/postgres
      tag: 18.3
      target_package: ${{ github.repository_owner }}/postgres
    permissions:
      packages: write
      contents: read

  mirror-nginxdemos-hello:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/nginxdemos/hello
      tag: 0.4
      target_package: ${{ github.repository_owner }}/nginxdemos-hello
    permissions:
      packages: write
      contents: read

  mirror-nginx-1-25:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/library/nginx
      tag: 1.25
      target_package: ${{ github.repository_owner }}/nginx
    permissions:
      packages: write
      contents: read

  mirror-nginx-1-27:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/library/nginx
      tag: 1.27
      target_package: ${{ github.repository_owner }}/nginx
    permissions:
      packages: write
      contents: read

  mirror-redis:
    uses: ./.github/workflows/mirror-docker-image.yml
    with:
      source_image: docker.io/bitnamisecure/redis
      tag: latest
      target_package: ${{ github.repository_owner }}/redis
    permissions:
      packages: write
      contents: read
